name: CI

on:
  push:
    branches: [main, work]
  pull_request:
    branches: [main, work]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest
          pip install fastapi==0.115.0 "uvicorn[standard]==0.30.6" httpx==0.28.1
          pip install pydantic==2.9.2 pydantic-settings==2.5.2 python-dotenv==1.0.1
          pip install psycopg2-binary==2.9.9 pgvector==0.3.5
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install sentence-transformers==3.2.1 numpy==1.26.4
          pip install python-json-logger==2.0.7 requests==2.32.5

      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest tests/ -v
